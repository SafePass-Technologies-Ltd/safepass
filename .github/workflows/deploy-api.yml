# SafePass — Deploy API to ECS Fargate
#
# Triggers on push to main when apps/api, packages/shared (its workspace
# dependency), or the Dockerfile change. Waits for the CI workflow to pass
# on the same commit before deploying (via workflow_run), builds the Docker
# image, pushes it to ECR, registers a new ECS task definition revision with
# the new image, and forces a new rolling deployment.
#
# CHANGE DETECTION: workflow_run doesn't support path filters directly, so
# relevance is checked explicitly against a moving "deployed-api" git tag
# (not a fixed HEAD~1) -- this correctly covers every commit since the LAST
# deploy, however many commits were batched into a single push. A fixed
# HEAD~1 diff would silently miss earlier commits in a multi-commit push
# whenever the last commit alone didn't touch apps/api/ or packages/shared/.
#
# ZERO-DOWNTIME NOTE (risk_log.md R-001 — safety-critical WebSocket path):
# the ECS service's deployment_minimum_healthy_percent=100 /
# deployment_maximum_percent=200 (configured in terraform/modules/ecs) means
# ECS starts new tasks alongside the old ones and only drains old tasks
# once new ones pass the /health check — never a "kill old task first"
# strategy that would drop active WebSocket/panic-alert connections.
name: Deploy API

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  # write (not read) so this workflow can move the deployed-api marker tag
  # after a successful deploy -- see the "Check for relevant changes" and
  # "Mark this commit as deployed" steps.
  contents: write

concurrency:
  group: deploy-api-production
  cancel-in-progress: false

env:
  AWS_REGION: "eu-west-2"
  ECR_REPOSITORY: safepass-production-api
  ECS_CLUSTER: safepass-production-cluster
  ECS_SERVICE: safepass-production-api
  CONTAINER_NAME: api

jobs:
  deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest
    # Only deploy if CI succeeded on this commit, and only if apps/api or
    # its shared dependency actually changed (workflow_run doesn't support
    # path filters directly, so we check changed files explicitly below).
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          # Full history (not the default shallow clone) so the relevance
          # check can diff against the deployed-api tag, which may be many
          # commits back, and so the tag itself can be moved/pushed later.
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        run: |
          # Diff against the deployed-api tag (everything since the last
          # successful deploy) rather than a fixed HEAD~1, so a push that
          # batches several commits together is checked in full -- not just
          # its last commit. On the very first run ever (tag doesn't exist
          # yet), treat it as relevant so the initial deploy always happens.
          if git rev-parse -q --verify refs/tags/deployed-api >/dev/null; then
            BASE=refs/tags/deployed-api
          else
            BASE=$(git rev-list --max-parents=0 HEAD | tail -1)
          fi
          if git diff --name-only "$BASE" HEAD | grep -qE '^(apps/api/|packages/shared/)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.changes.outputs.relevant == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: steps.changes.outputs.relevant == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check if image tag already exists in ECR
        if: steps.changes.outputs.relevant == 'true'
        id: image-check
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        # The ECR repo has image_tag_mutability = "IMMUTABLE" (see
        # terraform/modules/ecr/main.tf), so pushing the same SHA tag twice
        # fails outright ("tag ... already exists ... cannot be
        # overwritten"). This happens whenever this workflow re-runs for a
        # commit it already deployed (manual re-run, workflow_run re-trigger,
        # etc). Check first via describe-images and skip the build/push
        # entirely if the tag is already there -- the existing image is
        # reused as-is for the task definition below.
        run: |
          if aws ecr describe-images \
              --repository-name "$ECR_REPOSITORY" \
              --image-ids imageTag="$IMAGE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        if: steps.changes.outputs.relevant == 'true' && steps.image-check.outputs.exists == 'false'
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        # Only the git-SHA tag is pushed -- ":latest" was never consumed by
        # anything in this pipeline.
        run: |
          docker build -f apps/api/Dockerfile -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Resolve image reference
        if: steps.changes.outputs.relevant == 'true'
        id: build-output
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        # Set unconditionally (regardless of whether the build/push step ran)
        # so the render-task-definition step below always has an image ref.
        run: |
          echo "image=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        if: steps.changes.outputs.relevant == 'true'
        run: |
          aws ecs describe-task-definition \
            --task-definition "${ECS_SERVICE}" \
            --query 'taskDefinition' > task-def.json

      - name: Render new task definition with updated image
        if: steps.changes.outputs.relevant == 'true'
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-output.outputs.image }}

      - name: Deploy to ECS (rolling update)
        if: steps.changes.outputs.relevant == 'true'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true
          force-new-deployment: true

      - name: Mark this commit as deployed
        if: steps.changes.outputs.relevant == 'true'
        # Moves the deployed-api tag to this commit so the next run's
        # "Check for relevant changes" step diffs from here, not an
        # arbitrary fixed offset. Runs only after a successful deploy above.
        run: |
          git tag -f deployed-api ${{ github.event.workflow_run.head_sha }}
          git push origin deployed-api --force
