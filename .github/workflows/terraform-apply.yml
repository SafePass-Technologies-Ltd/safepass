# SafePass — Terraform Apply (main only, manual approval gated)
#
# Runs `terraform apply` against terraform/environments/production on push
# to main when terraform paths changed, or on-demand via the "Run workflow"
# button (workflow_dispatch). The manual trigger matters even when no .tf
# file changed: TF_VAR_* values below are sourced from repo/environment
# variables (e.g. ADMIN_DASHBOARD_URL, VERCEL_CNAME_*) that Terraform only
# ever re-reads on an actual apply -- editing them in GitHub's UI alone
# does not touch the running ECS task until this workflow runs again.
# Targets the GitHub Environment named "production" — GitHub blocks this
# job until a required reviewer approves it in the Environment's
# deployment queue.
#
# IMPORTANT (cannot be expressed in YAML): the "production" Environment's
# required-reviewers list is NOT configured here. A repo admin must create
# this Environment in GitHub (Settings > Environments > New environment >
# "production") and add at least one required reviewer under "Deployment
# protection rules" BEFORE this workflow will actually gate anything. Until
# that's done, referencing `environment: production` with no protection
# rules configured is a no-op pass-through — the job runs immediately.
#
# AUTH: OIDC only, same deploy role as terraform-plan.yml. This role is the
# user's pre-existing IAM role + OIDC provider, configured in AWS outside
# this repo's Terraform (not created or managed here). Its required
# permissions (broader infra-provisioning for this workflow, narrower
# deploy-only for deploy-api.yml) are documented in
# terraform/modules/iam-ecs/main.tf's header comment.
name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/environments/production/**"
      - "terraform/modules/**"
  # Lets a maintainer re-run this from the Actions tab (Run workflow) after
  # changing a repo/environment variable that feeds a TF_VAR_* below (e.g.
  # ADMIN_DASHBOARD_URL, VERCEL_CNAME_CONSOLE) -- no .tf edit needed to pick
  # those up, just a fresh apply.
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  # Only one apply at a time against production state — Terraform's own S3
  # backend locking also protects this, but serializing at the workflow
  # level avoids queuing multiple runs that would just fail on lock contention.
  group: tf-apply-production
  cancel-in-progress: false

env:
  TF_VERSION: "1.15.7"
  AWS_REGION: "eu-west-2"
  TF_WORKING_DIR: terraform/environments/production

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    # This is the manual-approval gate. GitHub Environment protection rules
    # (required reviewers) are configured in the GitHub UI, not here — see
    # the header comment above.
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      # Terraform's container_image var previously fell back to
      # vars.ECR_IMAGE_URI (or the placeholder:latest string if that repo
      # variable was ever unset/stale) -- decoupled from whatever image
      # deploy-api.yml actually has running right now. That was harmless
      # while aws_ecs_service.api's `ignore_changes = [task_definition]`
      # meant the running service never adopted Terraform's own task def
      # revisions. Now that the step below deliberately forces the service
      # onto the family's latest revision (so env-var-only changes like
      # ADMIN_DASHBOARD_URL take effect without a code deploy), a stale
      # placeholder image here would push a task definition ECS can never
      # actually pull.
      #
      # IMPORTANT: this deliberately reads the image off an actually
      # RUNNING task, NOT `aws ecs describe-task-definition --task-definition
      # <family>` (no revision). That family-only form always resolves to
      # the *latest registered* revision -- which, the first time this
      # step's logic was wrong, was itself a bad placeholder:latest
      # revision. Every subsequent run then kept re-reading that same
      # poisoned "latest" revision forever, even though the OLD healthy
      # tasks were still running fine underneath (ECS never kills working
      # tasks just because new ones fail to start) -- a self-perpetuating
      # CannotPullContainerError loop. Reading from a live RUNNING task
      # instead is immune to a bad revision sitting at the top of the
      # family's history.
      - name: Resolve currently-deployed image
        id: current-image
        env:
          # Matches modules/ecs's naming convention and deploy-api.yml's
          # hardcoded env block -- both currently fixed to
          # "safepass"/"production" (see production/variables.tf's defaults).
          CLUSTER: safepass-production-cluster
          SERVICE: safepass-production-api
        run: |
          IMAGE=""
          TASK_ARN=$(aws ecs list-tasks \
            --cluster "$CLUSTER" \
            --service-name "$SERVICE" \
            --desired-status RUNNING \
            --query 'taskArns[0]' \
            --output text 2>/dev/null || true)

          if [ -n "$TASK_ARN" ] && [ "$TASK_ARN" != "None" ]; then
            TD_ARN=$(aws ecs describe-tasks \
              --cluster "$CLUSTER" \
              --tasks "$TASK_ARN" \
              --query 'tasks[0].taskDefinitionArn' \
              --output text 2>/dev/null || true)
            if [ -n "$TD_ARN" ] && [ "$TD_ARN" != "None" ]; then
              IMAGE=$(aws ecs describe-task-definition \
                --task-definition "$TD_ARN" \
                --query 'taskDefinition.containerDefinitions[0].image' \
                --output text 2>/dev/null || true)
            fi
          fi

          if [ -z "$IMAGE" ] || [ "$IMAGE" = "None" ]; then
            # No running task found (very first apply ever, or the service
            # is currently fully down) -- fall back to the repo variable /
            # placeholder as before.
            IMAGE="${{ vars.ECR_IMAGE_URI || 'placeholder:latest' }}"
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_container_image: ${{ steps.current-image.outputs.image }}
          TF_VAR_admin_dashboard_url: ${{ vars.ADMIN_DASHBOARD_URL }}
          TF_VAR_corporate_dashboard_url: ${{ vars.CORPORATE_DASHBOARD_URL }}
          TF_VAR_transport_dashboard_url: ${{ vars.TRANSPORT_DASHBOARD_URL }}
          # Per-dashboard CNAME target Vercel issued under each project's
          # Settings > Domains when the console/corporate/transport
          # subdomain was added there (see terraform/modules/dns). Passed as
          # three plain strings rather than one JSON-object TF_VAR -- avoids
          # any YAML/JSON escaping risk, and a missing repo variable now
          # fails at `terraform plan` with a normal "no value for required
          # variable" error instead of an opaque Route53 XML error at apply.
          TF_VAR_vercel_cname_target_console: ${{ vars.VERCEL_CNAME_CONSOLE }}
          TF_VAR_vercel_cname_target_corporate: ${{ vars.VERCEL_CNAME_CORPORATE }}
          TF_VAR_vercel_cname_target_transport: ${{ vars.VERCEL_CNAME_TRANSPORT }}
        run: terraform apply -auto-approve -input=false

      # modules/ecs's aws_ecs_service has `ignore_changes = [task_definition]`
      # (deliberately -- so deploy-api.yml's own deploys don't get reverted
      # by the next `terraform apply`). That means the plain `apply` above
      # can register a brand new task definition revision (e.g. env vars
      # like ADMIN_DASHBOARD_URL/CORPORATE_DASHBOARD_URL/TRANSPORT_DASHBOARD_URL
      # changed) without the *running* service ever rolling onto it -- the
      # service keeps serving whatever revision it was already on
      # indefinitely. `--force-new-deployment` alone is NOT enough here: it
      # only restarts tasks using the service's *current* task definition
      # pointer, it does not advance to a newer revision. Passing
      # `--task-definition <family>` (no ":revision" suffix) makes ECS
      # resolve and deploy the family's latest ACTIVE revision -- exactly
      # the one `terraform apply` just registered.
      - name: Force ECS deployment onto the latest task definition revision
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SERVICE=$(terraform output -raw ecs_service_name)
          FAMILY=$(terraform output -raw ecs_task_definition_family)
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$FAMILY" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}" >/dev/null
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --region "${{ env.AWS_REGION }}"
