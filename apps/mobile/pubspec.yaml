name: safepass_mobile
description: SafePass — Road safety, trip monitoring, and incident intelligence for Nigeria.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  go_router: ^17.2.0
  dio: ^5.9.0
  firebase_core: ^3.15.0
  firebase_auth: ^5.5.0
  google_sign_in: 6.2.1
  sign_in_with_apple: ^8.1.0
  flutter_facebook_auth: 7.1.6
  google_maps_flutter: ^2.12.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  firebase_messaging: ^15.2.0
  web_socket_channel: ^3.0.0
  hive_ce: ^2.10.0
  hive_ce_flutter: ^2.3.4
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.0.0
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  intl: ^0.20.0
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0
  mobile_scanner: ^6.0.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.0
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mockito: ^5.4.0
  firebase_auth_mocks: ^0.14.0
  build_runner: ^2.4.0
  json_serializable: ^6.9.0
  freezed: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
